<html lang="en">

<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Stock List — Redesign Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111;--panel:#1f1f1f;--surface:#252525;
  --b1:rgba(255,255,255,.08);--b2:rgba(255,255,255,.13);
  --t1:#f0f0f0;--t2:#777;--t3:#444;
  --green:#4fcb6b;--red:#ec5e5e;--blue:#3a83f9;--amber:#f79d32;--purple:#b184f6;--indigo:#9b8fe8;
  --bd:#04388c;--bb:rgba(58,131,249,.75);--bl:#b1cefd;
}
body{background:var(--bg);font-family:'Gabarito',-apple-system,sans-serif;color:var(--t1);min-height:100vh;padding:24px 20px;display:flex;flex-direction:column;align-items:center;gap:16px}

/* ── Controls ── */
.ctrl{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--b2);border-radius:10px;padding:9px 16px;width:100%;max-width:520px;flex-wrap:wrap}
.cl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.bg{display:flex;gap:3px}
.btn{padding:5px 11px;border-radius:5px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap}
.btn:hover{border-color:rgba(255,255,255,.3);color:var(--t1)}
.btn.act{background:var(--bd);border-color:var(--bb);color:var(--bl)}
.s-open.act{background:rgba(79,203,107,.15)!important;border-color:rgba(79,203,107,.4)!important;color:var(--green)!important}
.s-pre.act{background:rgba(247,157,50,.15)!important;border-color:rgba(247,157,50,.4)!important;color:var(--amber)!important}
.s-cls.act{background:rgba(128,128,128,.12)!important;border-color:rgba(128,128,128,.28)!important;color:var(--t2)!important}
.s-ah.act{background:rgba(58,131,249,.15)!important;border-color:rgba(58,131,249,.4)!important;color:var(--blue)!important}
.s-on.act{background:rgba(155,143,232,.15)!important;border-color:rgba(155,143,232,.4)!important;color:var(--indigo)!important}
.vd{width:1px;height:22px;background:var(--b2);flex-shrink:0}
.mla{margin-left:auto}
.clk{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:5px}
.sp{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.05em}

/* ── Panel ── */
.panel{background:var(--panel);border-radius:10px;overflow:hidden;width:100%;max-width:520px}

/* ── Tabs ── */
.tabs{display:flex;padding:0 12px;border-bottom:1px solid var(--b1)}
.tab{display:flex;flex-direction:column;height:40px;align-items:center;justify-content:center;font-size:13px;color:var(--t2);cursor:pointer;white-space:nowrap;padding:0 10px;position:relative;transition:color .12s;flex-shrink:0}
.tab:hover{color:var(--t1)}
.tab.act{color:var(--blue);font-weight:600}
.tab.act::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--blue);border-radius:3px 3px 0 0}

/* ── Pills ── */
.pills{display:flex;gap:4px;padding:8px 12px 6px;overflow-x:auto}
.pill{padding:5px 9px;border-radius:7px;font-size:11px;color:var(--t2);border:1px solid var(--b2);cursor:pointer;white-space:nowrap;transition:all .12s;flex-shrink:0}
.pill:hover{border-color:rgba(255,255,255,.22);color:var(--t1)}
.pill.act{background:var(--bd);border-color:var(--bb);color:var(--bl);font-weight:600}

/* ── Session Banner ── */
.ban{display:flex;align-items:center;justify-content:space-between;padding:3px 14px 4px}
.bi{display:flex;align-items:center;gap:5px}
.bdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.btext{font-size:10px;font-weight:600}
.btime{font-size:10px;color:var(--t2)}

/* ── Pre-open CTA bar (ID only) ── */
.pre-cta{display:flex;align-items:center;gap:6px;margin:2px 12px 4px;padding:7px 10px;background:rgba(247,157,50,.07);border:1px solid rgba(247,157,50,.2);border-radius:7px}
.pre-cta-icon{font-size:13px}
.pre-cta-text{font-size:11px;color:var(--amber);flex:1}
.pre-cta-text strong{font-weight:700}
.pre-cta-btn{padding:3px 9px;border-radius:5px;background:rgba(247,157,50,.2);border:1px solid rgba(247,157,50,.4);color:var(--amber);font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap}
.pre-cta-btn:hover{background:rgba(247,157,50,.3)}

/* ── US education bar ── */
.us-edu{display:flex;align-items:center;gap:6px;margin:2px 12px 4px;padding:6px 10px;background:rgba(58,131,249,.07);border:1px solid rgba(58,131,249,.2);border-radius:7px}
.us-edu-icon{font-size:12px}
.us-edu-text{font-size:10px;color:var(--bl);line-height:1.4}

/* ── Stock list ── */
.slist{padding:2px 8px 8px}

/* ── Row base ── */
.nr{display:flex;align-items:center;gap:7px;height:32px;cursor:pointer;border-radius:6px;padding:0 4px;transition:background .1s;position:relative}
.nr.tall{height:44px}
.nr:hover{background:rgba(255,255,255,.045)}

/* ── Logo ── */
.logo{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:rgba(255,255,255,.9);letter-spacing:0}

/* ── Ticker + labels ── */
.info{flex:0 0 100px;min-width:0;display:flex;align-items:center;gap:4px;overflow:hidden}
.tk{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;flex-shrink:0}
.lset{display:flex;align-items:center;gap:3px;flex-shrink:0}
.l10x{display:inline-flex;align-items:center;height:14px;padding:0 4px;border:1px solid var(--purple);border-radius:3px;font-size:8px;font-weight:700;color:var(--purple);line-height:1;flex-shrink:0}
.lic{width:13px;height:13px;border-radius:3px;flex-shrink:0}

/* ── Position / order indicators (pre-open) ── */
.pos-ind{display:flex;align-items:center;gap:3px;flex-shrink:0}
.pi-pos{width:8px;height:8px;border-radius:50%;background:var(--green);opacity:.9;flex-shrink:0}
.pi-ord{width:8px;height:8px;border-radius:50%;border:2px solid var(--amber);flex-shrink:0}

/* ── Sparkline ── */
.spark{flex:1;min-width:30px;height:20px;overflow:visible}
.spark svg{width:100%;height:20px;display:block;overflow:visible}

/* ── ID standard price area (right-aligned 3-col) ── */
.pa{display:flex;align-items:center;gap:5px;flex-shrink:0}
.vc{font-size:11px;width:68px;text-align:right;white-space:nowrap;flex-shrink:0}
.pc{font-size:12px;font-weight:400;color:var(--t1);width:58px;text-align:right;white-space:nowrap;flex-shrink:0}
.pb{display:flex;align-items:center;justify-content:center;padding:2px 5px;border-radius:6px;font-size:11px;font-weight:600;width:54px;flex-shrink:0;white-space:nowrap}

/* ── US extended two-line price area ── */
.us-pa{display:flex;flex-direction:column;gap:2px;flex-shrink:0;align-items:flex-end}
.us-line{display:flex;align-items:center;gap:4px}
.us-sess{font-size:9px;font-weight:700;width:64px;text-align:left;white-space:nowrap;letter-spacing:.03em;flex-shrink:0}
.us-price{font-size:12px;font-weight:500;width:56px;text-align:right;white-space:nowrap;flex-shrink:0}
.us-val{font-size:11px;width:54px;text-align:right;white-space:nowrap;flex-shrink:0}
.us-pct{display:flex;align-items:center;justify-content:center;padding:2px 4px;border-radius:5px;font-size:10px;font-weight:600;width:52px;flex-shrink:0;white-space:nowrap}
.live-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;flex:0 0 5px}

/* ── Rich tooltip ── */
.tip{
  position:absolute;left:26px;bottom:calc(100% + 5px);
  background:#242424;border:1px solid var(--b2);border-radius:8px;
  padding:8px 10px;min-width:200px;
  pointer-events:none;z-index:100;
  opacity:0;transform:translateY(4px);transition:opacity .15s,transform .15s;
}
.nr:hover .tip{opacity:1;transform:translateY(0)}
.tip-name{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:6px}
.tip-full{font-size:10px;color:var(--t2);margin-bottom:8px}
.tip-divider{height:1px;background:var(--b1);margin:6px 0}
.tip-section{display:flex;flex-direction:column;gap:2px}
.tip-label{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--t2);margin-bottom:1px}
.tip-row{display:flex;justify-content:space-between;font-size:11px}
.tip-key{color:var(--t2)}
.tip-val{font-weight:600}
.tip-cta{margin-top:7px;padding:5px 8px;border-radius:5px;background:rgba(247,157,50,.15);border:1px solid rgba(247,157,50,.3);font-size:10px;font-weight:600;color:var(--amber);text-align:center}

/* ── Animations ── */
@keyframes spk{from{stroke-dashoffset:400}to{stroke-dashoffset:0}}
.spkl{stroke-dasharray:400;animation:spk .6s ease-out forwards}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.dpulse{animation:pulse 1.8s ease-in-out infinite}
@keyframes flash-up{0%{color:var(--t1)}40%{color:#7fffaa}100%{color:var(--t1)}}
@keyframes flash-dn{0%{color:var(--t1)}40%{color:#ff9090}100%{color:var(--t1)}}
.fu{animation:flash-up .7s ease-out forwards}
.fd{animation:flash-dn .7s ease-out forwards}
::-webkit-scrollbar{display:none}
</style>
</head>

function fmtIDPrice(n) {
  return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}
function fmtIDVal(n) {
  const a = Math.round(Math.abs(n)).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return (n>=0?'+':'-')+a;
}
function fmtIDPct(n) {
  return (n>=0?'+':'')+n.toFixed(2).replace('.',',')+',';
}
function fmtUSPrice(n) { return '$'+n.toFixed(2); }
function fmtUSVal(n)   { return (n>=0?'+$':'-$')+Math.abs(n).toFixed(2); }
function fmtUSPct(n)   { return (n>=0?'+':'')+n.toFixed(2)+'%'; }

function dispPrice(t) {
  const ls = live[t]; if(!ls) return '';
  return mkt==='ID' ? fmtIDPrice(ls.p) : fmtUSPrice(ls.p);
}
function dispVal(t) {
  const ls = live[t]; if(!ls) return '';
  return mkt==='ID' ? fmtIDVal(ls.v) : fmtUSVal(ls.v);
}
function dispPct(t) {
  const ls = live[t]; if(!ls) return '';
  return mkt==='ID' ? fmtIDPct(ls.pct)+'%' : fmtUSPct(ls.pct);
}
function dispExtPrice(t) {
  const ls = live[t]; if(!ls) return '';
  return fmtUSPrice(ls.ep);
}
function dispExtVal(t) {
  const ls = live[t]; if(!ls) return '';
  return fmtUSVal(ls.ev);
}
function dispExtPct(t) {
  const ls = live[t]; if(!ls) return '';
  return fmtUSPct(ls.epct);
}

// ═══════════════════════════════════════════════════════
// SPARKLINE
// ═══════════════════════════════════════════════════════

function normPts(data, w, h) {
  const mn=Math.min(...data), mx=Math.max(...data), r=(mx-mn)||1;
  return data.map((v,i)=>[(i/(data.length-1))*w, h*.88-((v-mn)/r)*h*.76]);
}

function curvePath(ps) {
  if(!ps||ps.length<2) return '';
  let d=`M${ps[0][0].toFixed(1)},${ps[0][1].toFixed(1)}`;
  for(let i=1;i<ps.length;i++){
    const a=ps[Math.max(0,i-2)],b=ps[i-1],c=ps[i],e=ps[Math.min(ps.length-1,i+1)];
    d+=` C${(b[0]+(c[0]-a[0])/6).toFixed(1)},${(b[1]+(c[1]-a[1])/6).toFixed(1)} ${(c[0]-(e[0]-b[0])/6).toFixed(1)},${(c[1]-(e[1]-b[1])/6).toFixed(1)} ${c[0].toFixed(1)},${c[1].toFixed(1)}`;
  }
  return d;
}

function buildSpark(ticker, noAnim) {
  const ls = live[ticker];
  if (!ls) return '';
  const W=60, H=20;
  const uid = ticker+(noAnim?'n':'')+(Math.random()*1e5|0);
  const anim = noAnim ? '' : 'class="spkl"';

  if (mkt === 'ID') {
    if (st === 'pre') {
      return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <line x1="2" y1="${H/2}" x2="${W-2}" y2="${H/2}" stroke="#f79d32" stroke-width="1.2" stroke-dasharray="4,4" stroke-linecap="round" opacity=".5"/>
      </svg>`;
    }
    // open & closed: show day's movement; closed = muted
    const opacity = st==='cls' ? '0.45' : '1';
    const ps = normPts(ls.d, W, H);
    const lp = curvePath(ps);
    const fp = lp+` L${ps[ps.length-1][0].toFixed(1)},${H} L${ps[0][0].toFixed(1)},${H} Z`;
    const clr = ls.dir>0?'#4fcb6b':'#ec5e5e';
    return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" opacity="${opacity}">
      <defs><linearGradient id="g${uid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${clr}" stop-opacity=".22"/>
        <stop offset="100%" stop-color="${clr}" stop-opacity="0"/>
      </linearGradient></defs>
      <path d="${fp}" fill="url(#g${uid})"/>
      <path d="${lp}" fill="none" stroke="${clr}" stroke-width="1.5" stroke-linecap="round" ${anim}/>
    </svg>`;
  }

  // US regular
  if (st === 'open') {
    const ps = normPts(ls.d, W, H);
    const lp = curvePath(ps);
    const fp = lp+` L${ps[ps.length-1][0].toFixed(1)},${H} L${ps[0][0].toFixed(1)},${H} Z`;
    const clr = ls.dir>0?'#4fcb6b':'#ec5e5e';
    return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs><linearGradient id="g${uid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${clr}" stop-opacity=".22"/>
        <stop offset="100%" stop-color="${clr}" stop-opacity="0"/>
      </linearGradient></defs>
      <path d="${fp}" fill="url(#g${uid})"/>
      <path d="${lp}" fill="none" stroke="${clr}" stroke-width="1.5" stroke-linecap="round" ${anim}/>
    </svg>`;
  }

  // US extended: regular session muted + ext session in session color
  const extClr = st==='pre'?'#f79d32':st==='ah'?'#3a83f9':'#9b8fe8';
  const regClr = ls.dir>0?'#4fcb6b':'#ec5e5e';
  const combined = [...ls.d, ...ls.ed];
  const allPs = normPts(combined, W, H);
  const regPs = allPs.slice(0, ls.d.length);
  const extPs = allPs.slice(ls.d.length-1);
  const extLp = curvePath(extPs);
  const extFp = extLp+` L${extPs[extPs.length-1][0].toFixed(1)},${H} L${extPs[0][0].toFixed(1)},${H} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="g${uid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${extClr}" stop-opacity=".2"/>
      <stop offset="100%" stop-color="${extClr}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${curvePath(regPs)}" fill="none" stroke="${regClr}" stroke-width="1" opacity=".3"/>
    <path d="${extFp}" fill="url(#g${uid})"/>
    <path d="${extLp}" fill="none" stroke="${extClr}" stroke-width="1.5" stroke-linecap="round" ${anim}/>
  </svg>`;
}

// ── Tooltip content for a row ──
function tipContent(s) {
  const port = PORTFOLIO[s.t];
  if (mkt === 'US') {
    return `<div class="tip-name">${s.t}</div><div class="tip-full">${s.n}</div>`;
  }
  if (st !== 'pre') {
    // open / closed: just company name
    return `<div class="tip-name">${s.t}</div><div class="tip-full">${s.n}</div>`;
  }
  // pre-opening: show portfolio details + CTA
  let html = `<div class="tip-name">${s.t}</div><div class="tip-full">${s.n}</div>`;
  if (port) {
    if (port.pos) {
      const ls = live[s.t];
      const pnl = ls ? (((ls.p - parseFloat(port.pos.avg.replace(/\./g,'')))/parseFloat(port.pos.avg.replace(/\./g,'')))*100).toFixed(2) : '—';
      const pnlColor = pnl>0?'var(--green)':'var(--red)';
      html += `<div class="tip-divider"></div>
      <div class="tip-section">
        <div class="tip-label">📊 Posisi Anda</div>
        <div class="tip-row"><span class="tip-key">Avg Beli</span><span class="tip-val">${port.pos.avg}</span></div>
        <div class="tip-row"><span class="tip-key">Qty</span><span class="tip-val">${port.pos.qty} lot</span></div>
        <div class="tip-row"><span class="tip-key">Unrealized</span><span class="tip-val" style="color:${pnlColor}">${pnl>0?'+':''}${pnl}%</span></div>
      </div>`;
    }
    if (port.order) {
      html += `<div class="tip-divider"></div>
      <div class="tip-section">
        <div class="tip-label">📋 Order Terbuka</div>
        <div class="tip-row"><span class="tip-key">${port.order.side} @ ${port.order.price}</span><span class="tip-val">${port.order.qty} lot</span></div>
        <div class="tip-row"><span class="tip-key">Status</span><span class="tip-val" style="color:var(--amber)">${port.order.status}</span></div>
      </div>`;
    }
  } else {
    html += `<div class="tip-cta">+ Pasang Order untuk ${s.t}</div>`;
  }
  return html;
}

// ── Labels ──
function renderLabels(s) {
  return (s.lbl||[]).map(l => {
    if (l==='10x') return `<span class="l10x">10x</span>`;
    if (l==='B')   return `<div class="lic" style="background:rgba(58,131,249,.25);border:1px solid rgba(58,131,249,.5)" title="Broker coverage"></div>`;
    if (l==='F')   return `<div class="lic" style="background:rgba(247,157,50,.2);border:1px solid rgba(247,157,50,.45)" title="Watchlist"></div>`;
    return '';
  }).join('');
}

// ── Position/order dots (pre-open ID only) ──
function renderPortIndicators(s) {
  if (mkt!=='ID' || st!=='pre') return '';
  const port = PORTFOLIO[s.t];
  if (!port) return '';
  let html = '<div class="pos-ind">';
  if (port.pos)   html += '<div class="pi-pos" title="Punya posisi"></div>';
  if (port.order) html += '<div class="pi-ord" title="Ada order aktif"></div>';
  html += '</div>';
  return html;
}

function renderIDRow(s) {
  const ls = live[s.t];
  if (!ls) return '';
  const isCls = st==='cls';
  const clr   = ls.dir>0?'var(--green)':'var(--red)';
  const bg    = ls.dir>0?'rgba(79,203,107,.17)':'rgba(236,94,94,.17)';
  const muted = isCls ? 'opacity:0.7' : '';

  // Price, value, pct displayed based on state
  // Closed: still show the day's movement — just subtly muted
  const priceColor = isCls ? 'var(--t2)' : 'var(--t1)';
  const valColor   = clr;
  const pctBg      = bg;
  const pctColor   = clr;

  return `<div class="nr" data-t="${s.t}">
    <div class="logo" style="background:${s.c}">${s.t.slice(0,2)}</div>
    <div class="info">
      <span class="tk">${s.t}</span>
      <div class="lset">${renderLabels(s)}${renderPortIndicators(s)}</div>
    </div>
    <div class="spark" id="sk-${s.t}">${buildSpark(s.t)}</div>
    <div class="pa">
      <span class="vc" style="color:${valColor};${muted}" data-field="val">${fmtIDVal(ls.v)}</span>
      <span class="pc" style="color:${priceColor}" data-field="price">${fmtIDPrice(ls.p)}</span>
      <span class="pb" style="background:${pctBg};color:${pctColor};${muted}" data-field="pct">${fmtIDPct(ls.pct)}%</span>
    </div>
    <div class="tip">${tipContent(s)}</div>
  </div>`;
}

function renderUSRow(s) {
  const ls = live[s.t];
  if (!ls) return '';
  const isExt = st==='pre'||st==='ah'||st==='on';
  const cs = stInfo();

  if (!isExt) {
    // Regular hours: single line
    const clr = ls.dir>0?'var(--green)':'var(--red)';
    const bg  = ls.dir>0?'rgba(79,203,107,.17)':'rgba(236,94,94,.17)';
    return `<div class="nr" data-t="${s.t}">
      <div class="logo" style="background:${s.c}">${s.t.slice(0,2)}</div>
      <div class="info"><span class="tk">${s.t}</span><div class="lset">${renderLabels(s)}</div></div>
      <div class="spark" id="sk-${s.t}">${buildSpark(s.t)}</div>
      <div class="pa">
        <span class="vc" style="color:${clr}" data-field="val">${fmtUSVal(ls.v)}</span>
        <span class="pc" data-field="price">${fmtUSPrice(ls.p)}</span>
        <span class="pb" style="background:${bg};color:${clr}" data-field="pct">${fmtUSPct(ls.pct)}</span>
      </div>
      <div class="tip">${tipContent(s)}</div>
    </div>`;
  }

  // Extended hours: two-line price
  const extDir = ls.edir||ls.dir;
  const extClr = extDir>0?'var(--green)':'var(--red)';
  const extBg  = extDir>0?'rgba(79,203,107,.17)':'rgba(236,94,94,.17)';
  const regDir = ls.dir;
  const regClr = regDir>0?'var(--green)':'var(--red)';

  // Session label text
  const sessLabel = {pre:'Pre-Market',ah:'After Market',on:'Overnight'}[st]||st.toUpperCase();

  return `<div class="nr tall" data-t="${s.t}">
    <div class="logo" style="background:${s.c}">${s.t.slice(0,2)}</div>
    <div class="info"><span class="tk">${s.t}</span><div class="lset">${renderLabels(s)}</div></div>
    <div class="spark" id="sk-${s.t}">${buildSpark(s.t)}</div>
    <div class="us-pa">
      <div class="us-line">
        <span class="us-sess" style="color:${cs.color}" data-field="ext-sess">${sessLabel}</span>
        <span class="us-price" data-field="ext-price">${fmtUSPrice(ls.ep)}</span>
        <span class="us-val" style="color:${extClr}" data-field="ext-val">${fmtUSVal(ls.ev)}</span>
        <span class="us-pct" style="background:${extBg};color:${extClr}" data-field="ext-pct">${fmtUSPct(ls.epct)}</span>
        <div class="live-dot dpulse" style="background:${cs.color}"></div>
      </div>
      <div class="us-line" style="opacity:0.55">
        <span class="us-sess" style="color:var(--t2)">Reg. Close</span>
        <span class="us-price" style="color:var(--t2)">${fmtUSPrice(ls.close)}</span>
        <span class="us-val" style="color:${regClr}">${fmtUSVal(ls.v)}</span>
        <span class="us-pct" style="background:${regDir>0?'rgba(79,203,107,.12)':'rgba(236,94,94,.12)'};color:${regClr}">${fmtUSPct(ls.pct)}</span>
        <div style="width:5px;flex:0 0 5px"></div>
      </div>
    </div>
    <div class="tip">${tipContent(s)}</div>
  </div>`;
}

function renderPanel() {
  const ss = mkt==='ID'?ID_BASE:US_BASE;
  const rows = ss.map(s => mkt==='ID' ? renderIDRow(s) : renderUSRow(s)).join('');
  document.getElementById('p-main').innerHTML = `

    ${renderBanner()}
    ${renderPreCTA()}
    ${renderUSEdu()}
    <div class="slist">${rows}</div>`;
  wireEvents();

// Update only price fields (no full re-render, preserves sparklines)
function updatePriceFields() {
  const ss = mkt==='ID'?ID_BASE:US_BASE;
  ss.forEach(s => {
    const row = document.querySelector(`[data-t="${s.t}"]`);
    if (!row) return;
    const ls = live[s.t];
    if (!ls) return;

    if (mkt === 'ID') {
      const vEl = row.querySelector('[data-field="val"]');
      const pEl = row.querySelector('[data-field="price"]');
      const pctEl = row.querySelector('[data-field="pct"]');
      if (vEl)   vEl.textContent = fmtIDVal(ls.v);
      if (pEl)   pEl.textContent = fmtIDPrice(ls.p);
      if (pctEl) pctEl.textContent = fmtIDPct(ls.pct)+'%';
    } else {
      const isExt = st==='pre'||st==='ah'||st==='on';
      if (isExt) {
        const epEl   = row.querySelector('[data-field="ext-price"]');
        const evEl   = row.querySelector('[data-field="ext-val"]');
        const epctEl = row.querySelector('[data-field="ext-pct"]');
        if (epEl)   epEl.textContent  = fmtUSPrice(ls.ep);
        if (evEl)   evEl.textContent  = fmtUSVal(ls.ev);
        if (epctEl) epctEl.textContent= fmtUSPct(ls.epct);
      } else {
        const vEl   = row.querySelector('[data-field="val"]');
        const pEl   = row.querySelector('[data-field="price"]');
        const pctEl = row.querySelector('[data-field="pct"]');
        if (vEl)   vEl.textContent = fmtUSVal(ls.v);
        if (pEl)   pEl.textContent = fmtUSPrice(ls.p);
        if (pctEl) pctEl.textContent= fmtUSPct(ls.pct);
      }
    }
  });
}

// ═══════════════════════════════════════════════════════
// LIVE SIMULATION
// ═══════════════════════════════════════════════════════

function isLive() {
  if (mkt==='ID') return st==='open';
  return true; // all US sessions are live
}

function flashEl(el, dir) {
  el.classList.remove('fu','fd');
  void el.offsetWidth;
  el.classList.add(dir>0?'fu':'fd');
}

function tickSim() {
  if (!isLive()) return;
  const ss = mkt==='ID'?ID_BASE:US_BASE;
  // Tick 1 or 2 random stocks
  const count = Math.random()<0.35 ? 2 : 1;
  const ticked = new Set();
  for (let i=0; i<count; i++) {
    const s = ss[Math.floor(Math.random()*ss.length)];
    if (ticked.has(s.t)) continue;
    ticked.add(s.t);
    const ls = live[s.t];
    if (!ls) continue;

    if (mkt==='ID' && st==='open') {
      // IDR prices move in steps: ±1,2,5,10,25,50 depending on price range
      const step = ls.p < 200 ? 1 : ls.p < 500 ? 2 : ls.p < 2000 ? 5 : ls.p < 5000 ? 10 : 25;
      const move = (Math.random()<0.53?1:-1) * step * (Math.floor(Math.random()*3)+1);
      ls.p += move;
      ls.v = ls.p - s.p0;
      ls.pct = (ls.v / s.p0) * 100;
      ls.dir = ls.pct>=0?1:-1;
      ls.d = [...ls.d.slice(1), ls.d[ls.d.length-1] + (move/s.p0)*500];
    } else if (mkt==='US') {
      const isExt = st!=='open';
      if (isExt) {
        const move = (Math.random()<0.52?1:-1) * (Math.random()*0.08+0.01);
        ls.ep += move;
        ls.ev  = ls.ep - ls.close;
        ls.epct= (ls.ev / ls.close)*100;
        ls.edir= ls.epct>=0?1:-1;
        ls.ed  = [...ls.ed.slice(1), ls.ed[ls.ed.length-1]+(move*20)];
      } else {
        const move = (Math.random()<0.52?1:-1)*(Math.random()*0.15+0.02);
        ls.p  += move;
        ls.v   = ls.p - s.p0;
        ls.pct = (ls.v / s.p0)*100;
        ls.dir = ls.pct>=0?1:-1;
        ls.d   = [...ls.d.slice(1), ls.d[ls.d.length-1]+(move*30)];
      }
    }

    // Flash the price element
    const row = document.querySelector(`[data-t="${s.t}"]`);
    if (row) {
      const isExt = mkt==='US' && (st==='pre'||st==='ah'||st==='on');
      const fld   = isExt ? '[data-field="ext-price"]' : '[data-field="price"]';
      const el    = row.querySelector(fld);
      const dir   = isExt ? (ls.edir||ls.dir) : ls.dir;
      if (el) flashEl(el, dir);

      // Occasionally refresh sparkline
      if (Math.random()<0.25) {
        const sk = document.getElementById('sk-'+s.t);
        if (sk) sk.innerHTML = buildSpark(s.t, true);
      }
    }
  }

  // Update all text fields
  updatePriceFields();
}

function startSim() {
  if (simTimer) clearInterval(simTimer);
  if (!isLive()) return;
  simTimer = setInterval(tickSim, 1600);
}

function updateClock() {
  const cs = stInfo();
  const now = new Date();
  const t = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  document.getElementById('clk-t').textContent = t+(mkt==='ID'?' WIB':' ET');
  const b = document.getElementById('clk-b');
  b.textContent = cs.short;
  b.style.cssText = `background:${cs.color}20;color:${cs.color};border:1px solid ${cs.color}40`;
}

// ═══════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════

function wireEvents() {
  document.querySelectorAll('.tab').forEach(el=>el.addEventListener('click',function(){
    this.closest('.tabs').querySelectorAll('.tab').forEach(x=>x.classList.remove('act'));
    this.classList.add('act');
  }));
  document.querySelectorAll('.pill').forEach(el=>el.addEventListener('click',function(){
    this.closest('.pills').querySelectorAll('.pill').forEach(x=>x.classList.remove('act'));
    this.classList.add('act');
  }));
}

function renderStateButtons() {
  const c = document.getElementById('state-btns');
  c.innerHTML = STATES[mkt].map(s=>
    `<button class="btn ${s.cls}${s.id===st?' act':''}" data-st="${s.id}">${s.short}</button>`
  ).join('');
  c.querySelectorAll('[data-st]').forEach(b=>b.addEventListener('click',function(){
    st = this.dataset.st;
    renderStateButtons();
    initLive();
    renderPanel();
    updateClock();
    startSim();
  }));
}
