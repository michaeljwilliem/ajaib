<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ajaib Terminal — Alpha · Desktop Scenes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0c;
  --s0:#000;--s1:#0d0d10;--s2:#16161a;--s3:#1f1f24;--s4:#2a2a30;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.10);--b3:rgba(255,255,255,.16);
  --t1:#f2f2f7;--t2:#9a9aa0;--t3:#5a5a60;
  --green:#30d158;--red:#ff453a;--blue:#0a84ff;--amber:#ffd60a;
  --idxc:#e8334a;

  /* Alpha tokens (Aurora) */
  --tm1:#8B7CFF;--tm2:#6EE7F7;
  --tm-grad:linear-gradient(135deg,#8B7CFF 0%,#6EE7F7 100%);
  --tm-bg:linear-gradient(135deg,rgba(139,124,255,.20) 0%,rgba(110,231,247,.08) 100%);
  --tm-bd:rgba(139,124,255,.45);
}
body{background:#040406;font-family:'Inter',-apple-system,sans-serif;color:var(--t1);min-height:100vh;display:flex;flex-direction:row;align-items:stretch;padding:0;gap:0}

/* ── Sidebar (scene selector) ── */
.sidebar{width:200px;min-height:100vh;background:rgba(6,6,8,.98);border-right:1px solid var(--b1);position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;flex-shrink:0;scrollbar-width:none}
.sidebar::-webkit-scrollbar{display:none}
.sb-head{padding:20px 14px 12px;border-bottom:1px solid var(--b1);flex-shrink:0}
.sb-title{font-size:13px;font-weight:600;letter-spacing:-.01em;line-height:1.4}
.sb-title span{color:var(--tm2);font-weight:500}
.sb-sub{font-size:10px;color:var(--t3);margin-top:4px;line-height:1.45}
.chips{display:flex;flex-direction:column;gap:1px;padding:8px 8px 24px}
.chip{padding:6px 10px;font-size:11px;font-weight:500;color:var(--t2);background:transparent;border:none;border-radius:7px;cursor:pointer;letter-spacing:.01em;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left;width:100%;display:flex;align-items:center}
.chip:hover{color:var(--t1);background:var(--s2)}
.chip.act{background:var(--tm-bg);color:var(--tm1);font-weight:600}
.chip .n{color:var(--t3);font-size:9px;margin-right:8px;font-weight:700;letter-spacing:.05em;display:inline-block;min-width:30px}
.chip.act .n{color:var(--tm1);opacity:.7}
.chip .dot{margin-left:auto;width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0}
.chip[data-built="1"] .dot{background:var(--tm2);box-shadow:0 0 4px var(--tm2)}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;align-items:center;padding:32px 32px 80px;gap:24px;min-height:100vh}
.stage{display:flex;flex-direction:column;gap:18px;align-items:center;width:100%}

/* ── Desktop frame (macOS window) ── */
.desktop-block{display:flex;flex-direction:column;gap:18px;align-items:center}
.desktop{width:1140px;height:720px;background:#1a1a1d;border-radius:12px;overflow:hidden;position:relative;box-shadow:0 0 0 1px rgba(255,255,255,.08),0 30px 80px rgba(0,0,0,.6),0 12px 40px rgba(0,0,0,.4);flex-shrink:0}
.dt-chrome{height:32px;background:linear-gradient(180deg,#2d2d32 0%,#232328 100%);display:flex;align-items:center;padding:0 14px;border-bottom:1px solid rgba(0,0,0,.4);position:relative;flex-shrink:0}
.dt-lights{display:flex;align-items:center;gap:8px;flex-shrink:0}
.dt-light{width:12px;height:12px;border-radius:50%}
.dt-light.r{background:#ff5f57;box-shadow:inset 0 0 0 .5px rgba(0,0,0,.2)}
.dt-light.y{background:#febc2e;box-shadow:inset 0 0 0 .5px rgba(0,0,0,.2)}
.dt-light.g{background:#28c840;box-shadow:inset 0 0 0 .5px rgba(0,0,0,.2)}
.dt-tabs{display:flex;align-items:center;margin-left:24px;gap:0;height:100%}
.dt-tab{padding:0 14px;height:100%;display:flex;align-items:center;font-size:11px;color:var(--t2);border-right:1px solid rgba(0,0,0,.3);position:relative;background:transparent;font-weight:500;letter-spacing:.01em;cursor:default}
.dt-tab.act{color:var(--t1);background:rgba(255,255,255,.04)}
.dt-tab .ttk{font-weight:600;margin-right:6px}
.dt-tab .tch{font-size:10px;color:var(--green);font-weight:500;margin-right:6px}
.dt-tab-x{margin-left:8px;color:var(--t3);font-size:11px}
.dt-tab-plus{padding:0 12px;color:var(--t3);font-size:14px;font-weight:300;cursor:default;display:flex;align-items:center;height:100%}
.dt-title{position:absolute;left:50%;transform:translateX(-50%);font-size:11px;color:var(--t3);font-weight:500;letter-spacing:.01em;pointer-events:none}

/* Window content area */
.dt-screen{background:var(--bg);width:100%;height:calc(100% - 32px);display:flex;flex-direction:column;overflow:hidden}

/* App layout — grid */
.app{flex:1;display:grid;grid-template-columns:56px 200px 1fr 240px 44px;grid-template-rows:1fr 156px;grid-template-areas:
  "nav wl chart ob rail"
  "nav acct acct acct rail";
  min-height:0;
  transition:grid-template-columns .28s ease-out;
}
.app.alpha-open{
  grid-template-columns:56px 200px 1fr 240px 340px 44px;
  grid-template-areas:
    "nav wl chart ob alpha rail"
    "nav acct acct acct alpha rail";
}

/* Left vertical nav */
.app-nav{grid-area:nav;background:#0d0d10;border-right:1px solid var(--b1);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:4px}
.an-logo{width:32px;height:32px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:800;margin-bottom:14px}
.an-item{width:44px;height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--t3);cursor:pointer;border-radius:8px;font-size:9px;font-weight:500;letter-spacing:.02em}
.an-item.act{background:rgba(10,132,255,.12);color:var(--blue)}
.an-item:hover:not(.act){color:var(--t2)}
.an-ic{font-size:14px;line-height:1}
.an-spacer{flex:1}
.an-profile{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#0a84ff,#5ac8fa);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;margin-bottom:6px}

/* Watchlist */
.app-wl{grid-area:wl;background:var(--s1);border-right:1px solid var(--b1);overflow-y:auto;display:flex;flex-direction:column;scrollbar-width:none}
.app-wl::-webkit-scrollbar{display:none}
.wl-h{padding:10px 14px 6px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b1);flex-shrink:0}
.wl-h-t{font-size:13px;font-weight:600}
.wl-h-add{font-size:14px;color:var(--blue);cursor:pointer;line-height:1}
.wl-row{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.025)}
.wl-row:hover{background:rgba(255,255,255,.03)}
.wl-row.act{background:rgba(10,132,255,.08)}
.wl-logo{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:8px;font-weight:700;flex-shrink:0}
.wl-mid{flex:1;min-width:0}
.wl-tk{font-size:11px;font-weight:600;display:flex;align-items:center;gap:3px;line-height:1.2}
.wl-tk .tag{font-size:7px;font-weight:700;padding:1px 3px;border-radius:2px;background:rgba(255,214,10,.15);color:var(--amber)}
.wl-name{font-size:9px;color:var(--t3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wl-rt{text-align:right;flex-shrink:0}
.wl-px{font-size:11px;font-weight:500;font-feature-settings:'tnum';line-height:1.2}
.wl-pct{font-size:9px;font-weight:600;margin-top:1px}
.wl-pct.up{color:var(--green)}.wl-pct.dn{color:var(--red)}

/* Chart panel */
.app-chart{grid-area:chart;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;min-width:0}
.ch-h{padding:8px 16px 8px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:12px;flex-shrink:0}
.ch-tk{font-size:15px;font-weight:700;color:var(--t1)}
.ch-name{font-size:11px;color:var(--t2);margin-left:-6px}
.ch-tags{display:flex;gap:5px;margin-left:6px}
.ch-tag{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;background:rgba(255,214,10,.15);color:var(--amber);border:1px solid rgba(255,214,10,.3);letter-spacing:.04em}
.ch-tag.tl{background:rgba(110,231,247,.1);color:var(--tm2);border-color:rgba(110,231,247,.3)}
.ch-tab-row{margin-left:auto;display:flex;gap:0;border:1px solid var(--b2);border-radius:6px;overflow:hidden;font-size:11px}
.ch-sub{padding:5px 11px;color:var(--t2);font-weight:500;cursor:pointer;border-right:1px solid var(--b1)}
.ch-sub:last-child{border-right:none}
.ch-sub.act{background:var(--s3);color:var(--t1);font-weight:600}
.ch-tools{padding:6px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:14px;flex-shrink:0;font-size:11px;color:var(--t2)}
.ch-tool{cursor:pointer;display:flex;align-items:center;gap:4px}
.ch-tool.act{color:var(--blue);font-weight:600}
.ch-tf{display:flex;align-items:center;gap:0;font-size:10px;margin-left:auto}
.ch-tf-b{padding:3px 8px;color:var(--t3);cursor:pointer;border-radius:4px;font-weight:500}
.ch-tf-b.act{background:var(--blue);color:#fff;font-weight:600}
.ch-canvas{flex:1;position:relative;overflow:hidden;background:var(--bg);min-height:0}
.ch-canvas svg{width:100%;height:100%;display:block}
.ch-axis-l{position:absolute;right:0;top:0;bottom:24px;width:50px;border-left:1px solid var(--b1);display:flex;flex-direction:column;justify-content:space-between;padding:8px 6px;font-size:9px;color:var(--t3);font-feature-settings:'tnum'}
.ch-axis-b{position:absolute;left:0;right:50px;bottom:0;height:24px;border-top:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 12px;font-size:9px;color:var(--t3)}
.ch-px-label{position:absolute;right:0;top:108px;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;font-feature-settings:'tnum'}

/* Order Book */
.app-ob{grid-area:ob;background:var(--s1);border-left:1px solid var(--b1);overflow-y:auto;display:flex;flex-direction:column;scrollbar-width:none}
.app-ob::-webkit-scrollbar{display:none}
.ob-h{padding:9px 12px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ob-h-t{font-size:11px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:5px}
.ob-h-up{font-size:9px;color:var(--red)}
.ob-h-x{font-size:11px;color:var(--t3);cursor:pointer}
.ob-stats{padding:10px 12px;border-bottom:1px solid var(--b1);flex-shrink:0}
.ob-tk{display:flex;align-items:center;gap:6px}
.ob-tk-name{font-size:11px;font-weight:600}
.ob-tk-px{margin-left:auto;font-size:13px;font-weight:700;font-feature-settings:'tnum'}
.ob-tk-chg{font-size:9px;color:var(--green);font-weight:500;margin-left:4px}
.ob-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;margin-top:8px;font-size:9.5px}
.ob-grid-l{color:var(--t3);font-size:8.5px;letter-spacing:.02em}
.ob-grid-v{color:var(--t1);font-weight:500;font-feature-settings:'tnum';text-align:right}
.ob-iep{padding:8px 12px;border-bottom:1px solid var(--b1);flex-shrink:0}
.ob-iep-h{font-size:9px;color:var(--t3);letter-spacing:.04em;font-weight:600;margin-bottom:4px}
.ob-iep-row{display:flex;align-items:center;gap:5px;font-size:10px}
.ob-iep-pill{background:var(--red);color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:.04em}
.ob-iep-v{font-feature-settings:'tnum'}
.ob-tbl{flex:1;overflow-y:auto;scrollbar-width:none}
.ob-tbl::-webkit-scrollbar{display:none}
.ob-tbl table{width:100%;border-collapse:collapse;font-size:9px}
.ob-tbl th{font-weight:600;color:var(--t3);text-align:right;padding:4px 8px;border-bottom:1px solid var(--b1);font-size:8px;text-transform:uppercase;letter-spacing:.05em;background:var(--s1);position:sticky;top:0}
.ob-tbl th:first-child{text-align:left}
.ob-tbl td{padding:3px 8px;font-feature-settings:'tnum';color:var(--t1);text-align:right}
.ob-tbl td.bid{color:var(--green);font-weight:600;text-align:left}
.ob-tbl td.ask{color:var(--red);font-weight:600}
.ob-tbl td.mid{color:var(--t2);text-align:center}

/* Account Manager (bottom) */
.app-acct{grid-area:acct;background:var(--s1);border-top:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden}
.acct-h{padding:8px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:0;flex-shrink:0}
.acct-tab{padding:4px 12px;font-size:11px;color:var(--t2);font-weight:500;cursor:pointer;border-radius:4px}
.acct-tab.act{background:var(--s3);color:var(--t1);font-weight:600}
.acct-body{flex:1;padding:14px 16px;font-size:10px;color:var(--t3);display:flex;align-items:center;justify-content:center}
.acct-cta{padding:8px 14px;display:flex;gap:10px;border-top:1px solid var(--b1)}
.acct-btn{flex:1;padding:9px;border:none;border-radius:6px;font-family:inherit;font-size:12px;font-weight:700;color:#fff;cursor:pointer;letter-spacing:.02em}
.acct-btn.sell{background:var(--red)}
.acct-btn.buy{background:var(--blue)}

/* Alpha rail (far right, always visible) */
.app-rail{grid-area:rail;background:#0a0a0c;border-left:1px solid var(--b1);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:8px}
.rail-alpha{width:36px;height:36px;border-radius:9px;background:var(--tm-bg);border:1px solid var(--tm-bd);display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;transition:all .15s}
.rail-alpha:hover{background:linear-gradient(135deg,rgba(139,124,255,.30),rgba(110,231,247,.12))}
.rail-alpha.act{background:linear-gradient(135deg,rgba(139,124,255,.36),rgba(110,231,247,.16));border-color:var(--tm1);box-shadow:0 0 12px rgba(139,124,255,.3)}
.rail-alpha::after{content:'';width:9px;height:9px;border-radius:50%;background:var(--tm2);box-shadow:0 0 8px var(--tm2),0 0 3px var(--tm2);animation:dotPulse 1.8s ease-in-out infinite}
@keyframes dotPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:.82}}
.rail-alpha .badge{position:absolute;top:-3px;right:-3px;background:var(--tm-grad);color:#0a0a0d;font-size:8px;font-weight:800;width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;border:1.5px solid #0a0a0c}
.rail-ic{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:13px;cursor:pointer;transition:all .15s}
.rail-ic:hover{background:var(--s2);color:var(--t2)}
.rail-spacer{flex:1}
.rail-label{font-size:7px;color:var(--t3);font-weight:700;letter-spacing:.1em;writing-mode:vertical-rl;transform:rotate(180deg);text-transform:uppercase;margin-top:8px}

/* Alpha panel */
.app-alpha{grid-area:alpha;background:linear-gradient(180deg,#0e0c14 0%,var(--s1) 100%);border-left:1px solid var(--tm-bd);display:flex;flex-direction:column;overflow:hidden;position:relative;animation:alphaIn .28s ease-out}
.app-alpha::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--tm-grad)}
@keyframes alphaIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.al-h{padding:12px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:9px;flex-shrink:0}
.al-mark{width:24px;height:24px;border-radius:7px;background:radial-gradient(circle,rgba(139,124,255,.4) 0%,rgba(139,124,255,0) 70%);display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.al-mark::after{content:'';width:9px;height:9px;border-radius:50%;background:var(--tm2);box-shadow:0 0 8px var(--tm2),0 0 3px var(--tm2);animation:dotPulse 1.8s ease-in-out infinite}
.al-title{flex:1;min-width:0}
.al-title-t{font-size:13px;font-weight:600;letter-spacing:-.01em}
.al-title-s{font-size:10px;color:var(--t2);margin-top:1px}
.al-x{width:24px;height:24px;border-radius:6px;background:transparent;color:var(--t3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .12s}
.al-x:hover{background:var(--s2);color:var(--t1)}
.al-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px;scrollbar-width:none}
.al-body::-webkit-scrollbar{display:none}
.al-msg{font-size:12px;color:var(--t1);line-height:1.6}
.al-msg p{margin-bottom:8px}
.al-msg strong{font-weight:600}
.al-msg em{color:var(--tm2);font-style:normal;font-weight:500}
.al-ref{background:var(--s1);border:1px solid var(--b1);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:10px}
.al-ref-tk{font-size:11px;font-weight:700;flex-shrink:0;min-width:42px}
.al-ref-b{flex:1;font-size:10px;color:var(--t2);line-height:1.45}
.al-ref-pct{font-size:10px;font-weight:600;flex-shrink:0}
.al-sug{display:flex;flex-wrap:wrap;gap:5px}
.al-sug-c{padding:5px 10px;background:var(--s2);border:1px solid var(--b2);border-radius:12px;font-size:10px;color:var(--t1);font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:4px}
.al-sug-c::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--tm2);box-shadow:0 0 4px var(--tm2)}
.al-input{padding:10px 12px;border-top:1px solid var(--b1);background:var(--s1);display:flex;gap:7px;align-items:center;flex-shrink:0}
.al-input-f{flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:14px;padding:7px 12px;font-size:11px;color:var(--t3)}
.al-input-send{width:28px;height:28px;border-radius:50%;background:var(--tm-grad);display:flex;align-items:center;justify-content:center;color:#0a0a0d;font-size:13px;font-weight:700;cursor:pointer}

/* ── Alpha components (ported from mobile prototype) ── */
.t-card{background:var(--tm-bg);border:1px solid var(--tm-bd);border-radius:10px;padding:11px 13px;position:relative}
.t-card-head{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.t-mark{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle,rgba(139,124,255,.4) 0%,rgba(139,124,255,0) 70%);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.t-mark::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--tm2);box-shadow:0 0 6px var(--tm2),0 0 2px var(--tm2);animation:dotPulse 1.8s ease-in-out infinite}
.t-label{font-size:9px;color:var(--tm2);letter-spacing:.12em;font-weight:700;text-transform:uppercase}
.t-title{font-size:12px;font-weight:600;line-height:1.35;margin-bottom:4px}
.t-body{font-size:11px;color:var(--t2);line-height:1.5}
.t-body strong{color:var(--t1);font-weight:600}
.t-body em{color:var(--tm2);font-style:normal;font-weight:500}
.t-cta{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--tm1);font-weight:600;cursor:pointer;margin-top:6px}
.t-pill{display:inline-flex;align-items:center;gap:3px;background:var(--tm-bg);border:1px solid var(--tm-bd);color:var(--tm1);font-size:9px;font-weight:600;padding:1px 5px 1px 3px;border-radius:4px}
.t-pill .t-mark{width:9px;height:9px}
.t-pill .t-mark::after{width:4px;height:4px;box-shadow:0 0 3px var(--tm2)}

/* ── Caption under desktop ── */
.cap{display:flex;flex-direction:column;gap:4px;max-width:780px;font-size:11px;color:var(--t2);line-height:1.55;text-align:left;padding:0 8px}
.cap-tag{font-size:10px;color:var(--tm1);letter-spacing:.1em;font-weight:700;text-transform:uppercase}
.cap-title{font-size:14px;color:var(--t1);font-weight:600;letter-spacing:-.01em;margin-top:2px}
.cap-meta{font-size:10px;color:var(--t3);margin-top:4px;font-family:'JetBrains Mono',monospace}

/* ── Placeholder scene (for unbuilt scenes) ── */
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;padding:60px}
.ph-tag{font-size:11px;color:var(--tm1);letter-spacing:.12em;font-weight:700;text-transform:uppercase}
.ph-title{font-size:28px;font-weight:700;letter-spacing:-.02em;max-width:580px;text-align:center;line-height:1.2}
.ph-body{font-size:14px;color:var(--t2);max-width:560px;text-align:center;line-height:1.55}
.ph-meta{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace;background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:8px 14px;margin-top:8px}

/* ── OS Toast (macOS notification) ── */
.os-toast{position:absolute;top:44px;right:12px;width:310px;background:rgba(30,30,36,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.6),0 2px 8px rgba(0,0,0,.3);animation:toastIn .4s cubic-bezier(.34,1.56,.64,1);z-index:100}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px) scale(.95)}to{opacity:1;transform:none}}
.os-toast-ic{width:36px;height:36px;border-radius:9px;background:var(--tm-bg);border:1px solid var(--tm-bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.os-toast-ic::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--tm2);box-shadow:0 0 8px var(--tm2),0 0 3px var(--tm2);animation:dotPulse 1.8s ease-in-out infinite}
.os-toast-bd{flex:1;min-width:0}
.os-toast-app{font-size:9px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.os-toast-title{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:2px;line-height:1.3}
.os-toast-sub{font-size:11px;color:var(--t2);line-height:1.4}

/* ── Alpha nudge (peek bubble) ── */
.alpha-nudge{position:absolute;bottom:72px;right:50px;width:198px;background:linear-gradient(135deg,rgba(20,16,36,.97),rgba(14,18,30,.97));backdrop-filter:blur(12px);border:1px solid var(--tm-bd);border-radius:12px;padding:10px 12px;box-shadow:0 4px 20px rgba(139,124,255,.2),0 2px 8px rgba(0,0,0,.5);animation:nudgeIn .35s cubic-bezier(.34,1.56,.64,1);z-index:50}
@keyframes nudgeIn{from{opacity:0;transform:translateX(10px) scale(.96)}to{opacity:1;transform:none}}
.nudge-head{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.nudge-mark{width:12px;height:12px;border-radius:50%;background:radial-gradient(circle,rgba(139,124,255,.4),transparent 70%);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.nudge-mark::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--tm2);box-shadow:0 0 5px var(--tm2);animation:dotPulse 1.8s ease-in-out infinite}
.nudge-lbl{font-size:9px;font-weight:700;color:var(--tm2);letter-spacing:.1em;text-transform:uppercase}
.nudge-text{font-size:10px;color:var(--t1);line-height:1.45;margin-bottom:7px}
.nudge-cta{font-size:9px;color:var(--tm1);font-weight:700;cursor:pointer;letter-spacing:.02em}

/* ── Hot row in order book ── */
.ob-tbl tr.hot td{background:rgba(139,124,255,.12)}
.ob-tbl tr.hot td.bid{color:var(--tm1);font-weight:700;text-shadow:0 0 8px rgba(139,124,255,.5)}
.ob-tbl tr.hot{outline:1px solid rgba(139,124,255,.3);outline-offset:-1px}

/* ── Macro strip ── */
.macro-strip{display:flex;align-items:stretch;border-bottom:1px solid var(--b1);background:var(--s1);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.macro-strip::-webkit-scrollbar{display:none}
.macro-cell{display:flex;flex-direction:column;justify-content:center;padding:4px 14px;border-right:1px solid var(--b1);cursor:default;flex-shrink:0;min-width:78px;transition:background .2s}
.macro-cell.hot{background:var(--tm-bg);position:relative}
.macro-cell.hot::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--tm-grad)}
.mc-lbl{font-size:8px;color:var(--t3);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:2px}
.mc-px{font-size:11px;font-weight:600;font-feature-settings:'tnum';color:var(--t1)}
.mc-chg{font-size:9px;font-weight:500;margin-top:1px}
.mc-chg.up{color:var(--green)}.mc-chg.dn{color:var(--red)}.mc-chg.hl{color:var(--tm2)}

/* ── Broker flow view ── */
.bv-h{padding:10px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;flex-shrink:0}
.bv-h-t{font-size:13px;font-weight:600}
.bv-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:2px}
.bv-sect{font-size:9px;color:var(--t3);letter-spacing:.06em;font-weight:700;text-transform:uppercase;margin:8px 0 4px}
.bv-row{display:flex;align-items:center;gap:8px;padding:3px 0}
.bv-name{font-size:10px;font-weight:700;color:var(--t1);width:28px;flex-shrink:0}
.bv-bar-wrap{flex:1;height:12px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
.bv-bar{height:100%;border-radius:3px;transition:width .3s}
.bv-bar.buy{background:rgba(48,209,88,.65)}
.bv-bar.sell{background:rgba(255,69,58,.65)}
.bv-bar.buy.hl{background:var(--tm-grad);box-shadow:0 0 8px rgba(139,124,255,.35)}
.bv-lot{font-size:9px;color:var(--t3);width:52px;text-align:right;font-feature-settings:'tnum';flex-shrink:0}

/* ── Foreign flow ── */
.ff-h{padding:10px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ff-h-t{font-size:13px;font-weight:600}
.ff-canvas{flex:1;padding:10px 16px;position:relative;min-height:0;display:flex;flex-direction:column}
.ff-acc-tag{display:inline-flex;align-items:center;gap:5px;background:var(--tm-bg);border:1px solid var(--tm-bd);border-radius:6px;padding:4px 10px;align-self:flex-end;margin-bottom:8px}
.ff-acc-lbl{font-size:9px;font-weight:700;color:var(--tm2);letter-spacing:.06em;text-transform:uppercase}
.ff-acc-val{font-size:11px;font-weight:700;color:var(--tm2)}

/* ── Order draft (S6) ── */
.order-draft{background:rgba(10,132,255,.07);border:1px solid rgba(10,132,255,.22);border-radius:10px;padding:13px;display:flex;flex-direction:column;gap:9px}
.od-lbl{font-size:9px;color:var(--tm2);font-weight:700;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.od-lbl::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--tm2);box-shadow:0 0 4px var(--tm2);animation:dotPulse 1.8s ease-in-out infinite}
.od-stock-row{display:flex;align-items:center;gap:8px}
.od-stock{font-size:16px;font-weight:700}
.od-badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--blue);color:#fff;letter-spacing:.04em}
.od-price{font-size:22px;font-weight:700;font-feature-settings:'tnum';letter-spacing:-.02em}
.od-detail{font-size:10px;color:var(--t2);line-height:1.5}
.od-why{font-size:10px;color:var(--t3);border-top:1px solid rgba(255,255,255,.06);padding-top:8px;line-height:1.5;font-style:italic}
.od-actions{display:flex;gap:7px}
.od-btn{flex:1;padding:8px;border:none;border-radius:7px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.02em}
.od-btn.dismiss{background:rgba(255,255,255,.07);color:var(--t2)}
.od-btn.send{background:var(--blue);color:#fff}

/* ── Cluster viz (S11) ── */
.cluster-grid{display:flex;flex-direction:column;gap:10px}
.cluster-item{background:var(--s1);border:1px solid var(--b1);border-radius:9px;padding:9px 11px}
.cluster-item.match{border-color:rgba(139,124,255,.4);background:rgba(139,124,255,.06)}
.ci-head{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.ci-tk{font-size:11px;font-weight:700}
.ci-name{font-size:9px;color:var(--t3);flex:1}
.ci-score{font-size:9px;font-weight:700;color:var(--tm2)}
.ci-spark{width:100%;height:36px;display:block}
.ci-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.ci-tag{font-size:8px;font-weight:600;padding:2px 6px;border-radius:3px;background:rgba(139,124,255,.12);color:var(--tm1);letter-spacing:.04em}

/* ── Corp timeline (S12) ── */
.ch-timeline{padding:8px 16px;border-top:1px solid var(--b1);background:var(--s1);flex-shrink:0;overflow-x:auto;scrollbar-width:none;display:flex;align-items:center;gap:0;position:relative}
.ch-timeline::-webkit-scrollbar{display:none}
.ch-timeline::before{content:'';position:absolute;top:50%;left:16px;right:16px;height:1px;background:var(--b2);transform:translateY(-50%)}
.tl-event{display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;z-index:1;min-width:72px}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tl-dot.past{background:var(--t3)}
.tl-dot.future{background:var(--tm2);box-shadow:0 0 8px var(--tm2),0 0 3px var(--tm2);animation:dotPulse 1.8s ease-in-out infinite}
.tl-date{font-size:8px;color:var(--t3);font-feature-settings:'tnum';text-align:center}
.tl-label{font-size:7.5px;color:var(--t2);text-align:center;max-width:68px;line-height:1.3}
.tl-impact{font-size:8px;font-weight:600;text-align:center}
.tl-impact.up{color:var(--green)}.tl-impact.dn{color:var(--red)}.tl-impact.proj{color:var(--tm2)}

/* ── Companion layout (S13) ── */
.companion-block{display:flex;gap:28px;align-items:flex-start;justify-content:center;width:100%}
.companion-desk{width:570px;height:360px;overflow:hidden;flex-shrink:0;opacity:.4;border-radius:12px}
.companion-desk .desktop{transform:scale(.5);transform-origin:top left;pointer-events:none}
.companion-phone{flex-shrink:0}

/* ── Phone frame ── */
.phone-frame{width:260px;height:540px;background:#0d0d10;border-radius:40px;overflow:hidden;position:relative;box-shadow:0 0 0 1px rgba(255,255,255,.12),0 20px 60px rgba(0,0,0,.7),inset 0 0 0 1px rgba(255,255,255,.04);flex-shrink:0}
.pf-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:100px;height:28px;background:#0d0d10;border-radius:0 0 18px 18px;z-index:10}
.pf-status{position:absolute;top:0;left:0;right:0;height:48px;display:flex;align-items:flex-start;padding:12px 18px 0;justify-content:space-between;z-index:5;pointer-events:none}
.pf-time{font-size:12px;font-weight:600;color:var(--t1)}
.pf-icons{font-size:10px;color:var(--t1);letter-spacing:2px}
.pf-screen{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;scrollbar-width:none}
.pf-screen::-webkit-scrollbar{display:none}
.pf-home{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:90px;height:4px;background:rgba(255,255,255,.28);border-radius:2px;z-index:10}

/* ── Phone push notification ── */
.phone-push{margin:52px 12px 0;background:rgba(28,28,36,.94);backdrop-filter:blur(20px);border-radius:14px;padding:13px;border:1px solid rgba(255,255,255,.1);box-shadow:0 4px 20px rgba(0,0,0,.4);animation:nudgeIn .4s cubic-bezier(.34,1.56,.64,1)}
.pp-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pp-app-ic{width:26px;height:26px;border-radius:7px;background:var(--tm-bg);border:1px solid var(--tm-bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.pp-app-ic::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--tm2);box-shadow:0 0 6px var(--tm2);animation:dotPulse 1.8s ease-in-out infinite}
.pp-app-name{font-size:10px;color:var(--t3);font-weight:600;flex:1}
.pp-time{font-size:9px;color:var(--t3)}
.pp-title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:4px;line-height:1.3}
.pp-body{font-size:11px;color:var(--t2);line-height:1.45}

/* ── Phone morning brief ── */
.phone-brief{padding:52px 14px 24px;display:flex;flex-direction:column;gap:10px}
.pb-greeting{font-size:10px;color:var(--t3)}
.pb-head{font-size:17px;font-weight:700;letter-spacing:-.02em;line-height:1.2;margin-bottom:2px}
.pb-head em{font-style:normal;background:var(--tm-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pb-sub{font-size:9px;color:var(--t3);margin-bottom:4px}
.pb-card{background:var(--tm-bg);border:1px solid var(--tm-bd);border-radius:10px;padding:10px 12px}
.pb-num{font-size:8px;color:var(--tm2);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.pb-title{font-size:11px;font-weight:600;color:var(--t1);margin-bottom:3px;line-height:1.3}
.pb-body{font-size:9.5px;color:var(--t2);line-height:1.5}
.pb-cta{font-size:9px;color:var(--tm1);font-weight:700;margin-top:5px}
.pb-footer{font-size:9px;color:var(--t3);text-align:center;margin-top:6px}

/* ── Hero PIP ── */
.hero-pip{position:absolute;bottom:18px;right:18px;width:146px;height:302px;background:#0d0d10;border-radius:24px;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.15),0 8px 32px rgba(0,0,0,.65);z-index:10}
.hero-pip-notch{height:18px;display:flex;align-items:center;justify-content:center}
.hero-pip-notch::after{content:'';width:44px;height:4px;border-radius:2px;background:#1c1c1e}
.hero-pip-screen{padding:2px 8px 8px;display:flex;flex-direction:column;gap:5px}
.hp-greeting{font-size:6px;color:var(--t3);margin-bottom:2px}
.hp-card{background:var(--tm-bg);border:1px solid var(--tm-bd);border-radius:5px;padding:5px 6px}
.hp-lbl{font-size:4.5px;color:var(--tm2);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.hp-txt{font-size:6px;color:var(--t1);line-height:1.35}
.hero-cta-block{text-align:center;padding:20px 0 8px;max-width:780px}
.hero-brand{font-size:11px;color:var(--t3);letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-bottom:10px}
.hero-tagline{font-size:26px;font-weight:700;letter-spacing:-.03em;line-height:1.15;color:var(--t1)}
.hero-tagline em{font-style:normal;background:var(--tm-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* ── Chaos browser (S0) ── */
.chaos-chrome{height:36px;background:linear-gradient(180deg,#38383d,#2d2d32);display:flex;align-items:center;padding:0 10px;border-bottom:1px solid rgba(0,0,0,.4);gap:6px;flex-shrink:0;overflow:hidden}
.chaos-tabs-wrap{display:flex;align-items:stretch;flex:1;overflow:hidden;height:100%;gap:1px}
.chaos-tab{display:flex;align-items:center;gap:3px;padding:0 7px;height:100%;font-size:8.5px;color:rgba(255,255,255,.45);background:rgba(40,40,46,.8);border-radius:6px 6px 0 0;cursor:default;flex-shrink:0;max-width:84px;min-width:60px;overflow:hidden;margin-top:5px}
.chaos-tab.active{background:#1a1a1e;color:rgba(255,255,255,.85)}
.chaos-tab-ico{font-size:9px;flex-shrink:0}
.chaos-tab-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chaos-tab-x{color:rgba(255,255,255,.25);font-size:8px;flex-shrink:0}
.chaos-panes{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;min-height:0;position:relative;overflow:hidden}
.chaos-pane{background:#0d0d10;overflow:hidden;display:flex;flex-direction:column}
.cp-h{padding:5px 10px;background:#16161a;border-bottom:1px solid rgba(255,255,255,.04);font-size:9px;color:var(--t3);font-weight:600;flex-shrink:0;display:flex;align-items:center;gap:5px}
.cp-content{flex:1;padding:8px 10px;overflow:hidden}
.chaos-notif{position:absolute;background:rgba(26,26,32,.96);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.09);border-radius:11px;padding:9px 11px;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:10}
.cn-app{font-size:8px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:4px;margin-bottom:3px}
.cn-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cn-title{font-size:10.5px;font-weight:600;color:var(--t1);margin-bottom:2px}
.cn-body{font-size:9.5px;color:var(--t2);line-height:1.4}

/* ── Earnings calendar view (S1) ── */
.cal-view{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.cal-h{padding:10px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:12px;flex-shrink:0}
.cal-h-t{font-size:13px;font-weight:600}
.cal-h-week{font-size:10px;color:var(--t3);margin-left:auto}
.cal-table{flex:1;overflow-y:auto;scrollbar-width:none}
.cal-table::-webkit-scrollbar{display:none}
.cal-table table{width:100%;border-collapse:collapse;font-size:10px}
.cal-table th{padding:6px 12px;font-size:8px;font-weight:700;color:var(--t3);text-align:left;border-bottom:1px solid var(--b1);letter-spacing:.06em;text-transform:uppercase;background:var(--s1);position:sticky;top:0}
.cal-table td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--t2);vertical-align:middle}
.cal-table td.tk{font-weight:700;color:var(--t1);font-size:11px}
.cal-table tr.hl td{background:rgba(255,214,10,.06)}
.cal-table tr.hl td.tk{color:var(--amber)}
.cal-table tr.hl-alpha td{background:rgba(139,124,255,.08)}
.cal-table tr.hl-alpha td.tk{color:var(--tm1)}
.cal-day{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);padding:10px 12px 4px;border-bottom:1px solid var(--b1);background:var(--s1)}

/* Responsive: clamp on very small viewports */
@media (max-width:1400px){
  .main{padding:24px 20px 60px}
  .desktop{transform:scale(.85);transform-origin:top center;margin-bottom:-108px}
}
@media (max-width:1240px){
  .desktop{transform:scale(.75);margin-bottom:-180px}
}
</style>

    const range = (Math.random() - 0.5) * 40 + (rising ? 10 : -5);
    const open = price;
    const close = price + range;
    const high = Math.max(open, close) + Math.random() * 15;
    const low = Math.min(open, close) - Math.random() * 15;
    price = close;
    const x = 20 + i * 18;
    const isUp = close >= open;
    const color = isUp ? '#30d158' : '#ff453a';
    // Map prices to y (4300-5000 → 350-30)
    const map = (p) => 350 - ((p - 4300) / 700) * 320;
    candles += `<line x1="${x}" y1="${map(high)}" x2="${x}" y2="${map(low)}" stroke="${color}" stroke-width="1"/>`;

// Render + navigation
// ─────────────────────────────────────────

let currentScene = 's0b';

function render(key) {
  currentScene = key;
  const stage = document.getElementById('stage');
  const html = scenes[key] ? scenes[key]() : placeholderScene(key);
  stage.innerHTML = `<div class="desktop-block">${html}</div>`;
}

// Toggle Alpha panel — pairs between closed/open variants of scenes
const alphaPairs = {s0b:'s2', s2:'s0b', s4:'s5', s5:'s4', s7:'s8', s8:'s7', s10:'s12', s12:'s10', s11:'s10'};
window.toggleAlpha = function() {
  const pair = alphaPairs[currentScene];
  if (pair) goTo(pair);
};

window.goTo = function(key){
  const c = document.querySelector(`.chip[data-s="${key}"]`);
  if(c) c.click();
};

document.querySelectorAll('.chip').forEach(c=>{
  c.addEventListener('click',()=>{
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('act'));
    c.classList.add('act');
    render(c.dataset.s);
  });
});

document.addEventListener('keydown',e=>{
  const chips=[...document.querySelectorAll('.chip')];
  const i=chips.findIndex(c=>c.classList.contains('act'));
  if(e.key==='ArrowRight'&&i<chips.length-1)chips[i+1].click();
  if(e.key==='ArrowLeft'&&i>0)chips[i-1].click();
});

// Initial render
render('s0b');
